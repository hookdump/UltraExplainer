<style>
  body { padding: 0 !important; overflow: hidden !important; }
  .ux-deck { height: 100dvh; overflow-y: auto; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .ux-slide {
    height: 100dvh; scroll-snap-align: start; position: relative; isolation: isolate;
    display: flex; flex-direction: column; justify-content: center;
    padding: clamp(40px, 6vh, 84px) clamp(40px, 8vw, 130px); overflow: hidden;
    opacity: 0; transform: translateY(36px) scale(0.985);
    transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
  }
  .ux-slide.is-visible { opacity: 1; transform: none; }
  .ux-slide .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.5s var(--ease), transform 0.5s var(--ease); }
  .ux-slide.is-visible .reveal { opacity: 1; transform: none; }
  .ux-slide.is-visible .reveal:nth-child(1) { transition-delay: 0.08s; }
  .ux-slide.is-visible .reveal:nth-child(2) { transition-delay: 0.18s; }
  .ux-slide.is-visible .reveal:nth-child(3) { transition-delay: 0.28s; }
  .ux-slide.is-visible .reveal:nth-child(4) { transition-delay: 0.38s; }
  .ux-slide.is-visible .reveal:nth-child(5) { transition-delay: 0.48s; }
  @media (prefers-reduced-motion: reduce) { .ux-slide, .ux-slide .reveal { opacity: 1 !important; transform: none !important; } }

  .ux-deck-progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); z-index: 90; transition: width 0.3s; }
  .ux-deck-dots { position: fixed; right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 9px; z-index: 90; }
  .ux-deck-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); opacity: .4; border: none; padding: 0; cursor: pointer; transition: opacity .2s, transform .2s, background .2s; }
  .ux-deck-dot:hover { opacity: .7; }
  .ux-deck-dot.is-active { opacity: 1; background: var(--accent); transform: scale(1.5); }
  .ux-deck-counter { position: fixed; bottom: 16px; right: 18px; font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); z-index: 90; font-variant-numeric: tabular-nums; }
  .ux-deck-hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); z-index: 90; transition: opacity .5s; }
  .ux-deck-hint.is-faded { opacity: 0; pointer-events: none; }

  .s-display { font-family: var(--font-display); font-size: clamp(46px, 8.6vw, 100px); font-weight: 700; letter-spacing: -2.5px; line-height: .98; text-wrap: balance; }
  .s-display .lit { background: linear-gradient(100deg, var(--accent-2), var(--good)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .s-h { font-family: var(--font-display); font-size: clamp(28px, 5vw, 46px); font-weight: 700; letter-spacing: -1px; line-height: 1.1; text-wrap: balance; }
  .s-sub { font-family: var(--font-mono); font-size: clamp(12px, 1.5vw, 16px); letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); }
  .s-body { font-size: clamp(16px, 2.1vw, 22px); line-height: 1.6; color: var(--text-dim); max-width: 60ch; text-wrap: pretty; }
  .slide--title { align-items: center; text-align: center; }
  .slide--title .s-display { color: var(--text); }
  .slide--divider .s-num { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-display); font-size: clamp(170px, 36vw, 440px); font-weight: 700; color: var(--accent); opacity: .07; pointer-events: none; z-index: -1; font-variant-numeric: tabular-nums; }
  .s-bullets { list-style: none; display: grid; gap: 14px; margin-top: 20px; padding: 0; }
  .s-bullets li { position: relative; padding-left: 26px; font-size: clamp(16px, 2vw, 21px); color: var(--text-dim); line-height: 1.45; }
  .s-bullets li::before { content: ""; position: absolute; left: 0; top: .55em; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); }
  .slide--split .s-cols { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(24px, 4vw, 56px); align-items: center; width: 100%; }
  .s-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: clamp(14px, 2vw, 26px); width: 100%; }
  .slide--diagram .ux-mermaid-canvas { display: flex; justify-content: center; }
  .slide--diagram .mermaid svg { max-height: 64vh; height: auto; }
  .slide--quote { align-items: center; text-align: center; }
  .slide--quote blockquote { font-family: var(--font-display); font-size: clamp(26px, 4.6vw, 52px); font-weight: 500; line-height: 1.3; max-width: 18ch; margin: 0; }
  .slide--quote .mark { font-family: var(--font-display); font-size: clamp(80px, 14vw, 160px); line-height: .4; color: var(--accent); opacity: .16; }
  @media (max-width: 760px) { .slide--split .s-cols { grid-template-columns: 1fr; } .ux-deck-dots { display: none; } }
</style>
